<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TimENC</title>
  <style>
    :root {
      --bg-primary: #0d1117;
      --bg-secondary: #161b22;
      --bg-tertiary: #21262d;
      --border: #30363d;
      --text-primary: #f0f6fc;
      --text-secondary: #8b949e;
      --accent: #58a6ff;
      --accent-hover: #79c0ff;
      --success: #3fb950;
      --danger: #f85149;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 700px;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }

    .header {
      padding: 20px 28px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-icon {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, var(--accent), #1f6feb);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 16px;
      color: white;
    }

    .logo-text {
      font-size: 1.25rem;
      font-weight: 600;
    }

    .status {
      padding: 6px 14px;
      border-radius: 12px;
      font-size: 0.8rem;
      background: var(--bg-tertiary);
      color: var(--text-secondary);
    }

    .status.success {
      background: rgba(63, 185, 80, 0.15);
      color: var(--success);
    }

    .status.error {
      background: rgba(248, 81, 73, 0.15);
      color: var(--danger);
    }

    .nav {
      display: flex;
      border-bottom: 1px solid var(--border);
    }

    .nav-btn {
      flex: 1;
      padding: 12px;
      background: transparent;
      border: none;
      color: var(--text-secondary);
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
    }

    .nav-btn:hover {
      color: var(--text-primary);
      background: var(--bg-tertiary);
    }

    .nav-btn.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    .content {
      padding: 28px;
    }

    .page {
      display: none;
    }

    .page.active {
      display: block;
    }

    .page-title {
      font-size: 1.4rem;
      font-weight: 600;
      margin-bottom: 24px;
    }

    .form-group {
      margin-bottom: 18px;
    }

    .form-label {
      display: block;
      font-size: 0.85rem;
      font-weight: 500;
      margin-bottom: 8px;
    }

    .input-row {
      display: flex;
      gap: 8px;
    }

    .input {
      flex: 1;
      padding: 10px 12px;
      background: var(--bg-primary);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-primary);
      font-size: 0.9rem;
    }

    .input:focus {
      outline: none;
      border-color: var(--accent);
    }

    .input::placeholder {
      color: var(--text-secondary);
    }

    .btn {
      padding: 10px 14px;
      border-radius: 6px;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid var(--border);
      background: var(--bg-tertiary);
      color: var(--text-primary);
      transition: all 0.2s;
      white-space: nowrap;
    }

    .btn:hover:not(:disabled) {
      background: var(--border);
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #0d1117;
    }

    .btn-primary:hover:not(:disabled) {
      background: var(--accent-hover);
    }

    .btn-success {
      background: var(--success);
      border-color: var(--success);
      color: white;
    }

    .btn-success:hover:not(:disabled) {
      background: #2ea043;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .checkbox-label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.85rem;
      color: var(--text-secondary);
      cursor: pointer;
      user-select: none;
    }

    .checkbox-label input {
      width: 16px;
      height: 16px;
      accent-color: var(--accent);
    }

    .strength-bar {
      height: 3px;
      background: var(--bg-tertiary);
      border-radius: 2px;
      overflow: hidden;
      margin-top: 6px;
    }

    .strength-fill {
      height: 100%;
      width: 0;
      transition: width 0.3s, background 0.3s;
    }

    .strength-text {
      font-size: 0.75rem;
      color: var(--text-secondary);
      margin-top: 4px;
    }

    .result-box {
      margin-top: 20px;
      padding: 12px;
      background: var(--bg-primary);
      border: 1px solid var(--border);
      border-radius: 6px;
      font-family: 'Consolas', monospace;
      font-size: 0.8rem;
      color: var(--text-secondary);
      min-height: 50px;
      white-space: pre-wrap;
    }

    .settings-group {
      margin-bottom: 20px;
    }

    .settings-label {
      font-size: 0.9rem;
      font-weight: 500;
      margin-bottom: 8px;
    }

    .settings-desc {
      color: var(--text-secondary);
      font-size: 0.8rem;
      margin-bottom: 10px;
    }

    .select {
      padding: 8px 12px;
      background: var(--bg-primary);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-primary);
      font-size: 0.9rem;
      cursor: pointer;
    }

    .select:focus {
      outline: none;
      border-color: var(--accent);
    }

    .hidden {
      display: none;
    }

    @media (max-width: 600px) {
      .container {
        border-radius: 0;
      }
      
      .header {
        padding: 16px 20px;
      }
      
      .content {
        padding: 20px;
      }
      
      .grid-2 {
        grid-template-columns: 1fr;
      }
      
      .input-row {
        flex-wrap: wrap;
      }
      
      .input-row .btn {
        flex: 1;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header class="header">
      <div class="logo">
        <div class="logo-icon">🔐</div>
        <div class="logo-text">TimENC</div>
      </div>
      <div id="status" class="status">Ready</div>
    </header>
    
    <nav class="nav">
      <button class="nav-btn active" data-page="encrypt" id="nav-encrypt">Encrypt</button>
      <button class="nav-btn" data-page="decrypt" data-page="decrypt" id="nav-decrypt">Decrypt</button>
      <button class="nav-btn" data-page="tools" id="nav-tools">Tools</button>
      <button class="nav-btn" data-page="settings" id="nav-settings">Settings</button>
    </nav>
    
    <div class="content">
      <!-- Encrypt Page -->
      <section id="page-encrypt" class="page active">
        <h2 class="page-title" id="enc-title">Encrypt</h2>
        
        <form id="encrypt-form">
          <div class="form-group">
            <label class="form-label" id="enc-input-label">File or folder</label>
            <div class="input-row">
              <input type="text" class="input" id="enc-input" placeholder="Select..." required>
              <button type="button" class="btn" id="enc-browse-input">File</button>
              <button type="button" class="btn" id="enc-browse-folder">Folder</button>
            </div>
          </div>
          
          <div class="form-group">
            <label class="form-label" id="enc-output-label">Output file</label>
            <div class="input-row">
              <input type="text" class="input" id="enc-output" placeholder="Auto-suggested" required>
              <button type="button" class="btn" id="enc-save-output">Save As</button>
            </div>
          </div>
          
          <div class="form-group">
            <label class="form-label" id="enc-password-label">Password</label>
            <div class="input-row">
              <input type="password" class="input" id="enc-password" required>
              <button type="button" class="btn" data-toggle="enc-password">Show</button>
            </div>
            <div class="strength-bar">
              <div class="strength-fill" id="enc-fill"></div>
            </div>
            <div class="strength-text" id="enc-strength">Enter a password</div>
          </div>
          
          <div class="form-group">
            <label class="form-label" id="enc-keyfile-label">Keyfile (optional)</label>
            <div class="input-row">
              <input type="text" class="input" id="enc-keyfile" placeholder="Select keyfile">
              <button type="button" class="btn" id="enc-browse-keyfile">Browse</button>
              <button type="button" class="btn" id="jump-tools">Create</button>
            </div>
          </div>
          
          <div style="margin-top: 24px">
            <button type="submit" class="btn btn-primary" style="width: 100%; padding: 12px;" id="enc-submit">Encrypt</button>
          </div>
        </form>
      </section>
      
      <!-- Decrypt Page -->
      <section id="page-decrypt" class="page">
        <h2 class="page-title" id="dec-title">Decrypt</h2>
        
        <form id="decrypt-form">
          <div class="form-group">
            <label class="form-label" id="dec-input-label">Encrypted file</label>
            <div class="input-row">
              <input type="text" class="input" id="dec-input" placeholder="Select .timenc file" required>
              <button type="button" class="btn" id="dec-browse-input">Browse</button>
            </div>
          </div>
          
          <div class="form-group">
            <label class="form-label" id="dec-output-label">Output folder</label>
            <div class="input-row">
              <input type="text" class="input" id="dec-output" placeholder="Auto-suggested" required>
              <button type="button" class="btn" id="dec-browse-output">Browse</button>
            </div>
          </div>
          
          <div class="grid-2">
            <div class="form-group">
              <label class="form-label" id="dec-password-label">Password</label>
              <div class="input-row">
                <input type="password" class="input" id="dec-password" required>
                <button type="button" class="btn" data-toggle="dec-password">Show</button>
              </div>
            </div>
            
            <div class="form-group">
              <label class="form-label" id="dec-keyfile-label">Keyfile (optional)</label>
              <div class="input-row">
                <input type="text" class="input" id="dec-keyfile" placeholder="Select keyfile">
                <button type="button" class="btn" id="dec-browse-keyfile">Browse</button>
              </div>
            </div>
          </div>
          
          <div style="margin-top: 24px">
            <button type="submit" class="btn btn-success" style="width: 100%; padding: 12px;" id="dec-submit">Decrypt</button>
          </div>
        </form>
      </section>
      
      <!-- Tools Page -->
      <section id="page-tools" class="page">
        <h2 class="page-title" id="tools-title">Tools</h2>
        
        <form id="keyfile-form">
          <div class="form-group">
            <label class="form-label" id="keyfile-label">Keyfile path</label>
            <div class="input-row">
              <input type="text" class="input" id="keyfile-output" placeholder="Select location" required>
              <button type="button" class="btn" id="keyfile-save-output">Save As</button>
            </div>
          </div>
          
          <button type="submit" class="btn btn-primary" style="width: 100%; padding: 12px;" id="keyfile-submit">Generate Keyfile</button>
        </form>
        
        <div class="form-group">
          <label class="form-label" id="result-label">Last Result</label>
          <div class="result-box" id="result">No operation run yet.</div>
        </div>
      </section>
      
      <!-- Settings Page -->
      <section id="page-settings" class="page">
        <h2 class="page-title" id="settings-title">Settings</h2>
        
        <div class="settings-group">
          <div class="settings-label" id="lang-label">Language</div>
          <select class="select" id="language-select">
            <option value="en">English</option>
            <option value="de">Deutsch</option>
          </select>
        </div>
        
        <div class="settings-group">
          <div class="settings-label" id="version-label">Version</div>
          <div class="settings-desc" id="version-desc">TimENC v2.0.0</div>
        </div>
      </section>
    </div>
  </div>
  
  <script>
    const translations = {
      en: {
        nav: { encrypt: "Encrypt", decrypt: "Decrypt", tools: "Tools", settings: "Settings" },
        encrypt: {
          title: "Encrypt",
          inputLabel: "File or folder",
          inputPlaceholder: "Select...",
          fileBtn: "File",
          folderBtn: "Folder",
          outputLabel: "Output file",
          saveAsBtn: "Save As",
          passwordLabel: "Password",
          showBtn: "Show",
          hideBtn: "Hide",
          keyfileLabel: "Keyfile (optional)",
          keyfilePlaceholder: "Select keyfile",
          browseBtn: "Browse",
          createBtn: "Create",
          submitBtn: "Encrypt"
        },
        decrypt: {
          title: "Decrypt",
          inputLabel: "Encrypted file",
          inputPlaceholder: "Select .timenc file",
          outputLabel: "Output folder",
          passwordLabel: "Password",
          keyfileLabel: "Keyfile (optional)",
          submitBtn: "Decrypt"
        },
        tools: {
          title: "Tools",
          label: "Keyfile path",
          placeholder: "Select location",
          saveAsBtn: "Save As",
          submitBtn: "Generate Keyfile",
          resultLabel: "Last Result"
        },
        settings: {
          title: "Settings",
          langLabel: "Language",
          versionLabel: "Version",
          versionDesc: "TimENC v2.0.0 - ChaCha20-Poly1305 + Argon2id"
        },
        common: {
          ready: "Ready",
          working: "Working...",
          completed: "Completed",
          noResult: "No operation run yet.",
          weak: "Weak",
          fair: "Fair",
          strong: "Strong",
          veryStrong: "Very strong",
          enterPassword: "Enter a password"
        }
      },
      de: {
        nav: { encrypt: "Verschlüsseln", decrypt: "Entschlüsseln", tools: "Werkzeuge", settings: "Einstellungen" },
        encrypt: {
          title: "Verschlüsseln",
          inputLabel: "Datei oder Ordner",
          inputPlaceholder: "Auswählen...",
          fileBtn: "Datei",
          folderBtn: "Ordner",
          outputLabel: "Ausgabedatei",
          saveAsBtn: "Speichern als",
          passwordLabel: "Passwort",
          showBtn: "Anzeigen",
          hideBtn: "Verbergen",
          keyfileLabel: "Keyfile (optional)",
          keyfilePlaceholder: "Keyfile auswählen",
          browseBtn: "Durchsuchen",
          createBtn: "Erstellen",
          submitBtn: "Verschlüsseln"
        },
        decrypt: {
          title: "Entschlüsseln",
          inputLabel: "Verschlüsselte Datei",
          inputPlaceholder: ".timenc-Datei auswählen",
          outputLabel: "Zielordner",
          passwordLabel: "Passwort",
          keyfileLabel: "Keyfile (optional)",
          submitBtn: "Entschlüsseln"
        },
        tools: {
          title: "Werkzeuge",
          label: "Keyfile-Pfad",
          placeholder: "Speicherort auswählen",
          saveAsBtn: "Speichern als",
          submitBtn: "Keyfile erstellen",
          resultLabel: "Letztes Ergebnis"
        },
        settings: {
          title: "Einstellungen",
          langLabel: "Sprache",
          versionLabel: "Version",
          versionDesc: "TimENC v2.0.0 - ChaCha20-Poly1305 + Argon2id"
        },
        common: {
          ready: "Bereit",
          working: "In Arbeit...",
          completed: "Abgeschlossen",
          noResult: "Noch kein Vorgang.",
          weak: "Schwach",
          fair: "Mittel",
          strong: "Stark",
          veryStrong: "Sehr stark",
          enterPassword: "Passwort eingeben"
        }
      }
    };
    
    let currentLang = localStorage.getItem("timenc.language") || "en";
    let activePage = "encrypt";
    
    const statusEl = document.getElementById("status");
    const resultEl = document.getElementById("result");
    const languageSelect = document.getElementById("language-select");
    const CURRENT_VERSION = "2.0.0";
    
    function t(section, key) {
      return translations[currentLang][section]?.[key] || translations.en[section]?.[key] || "";
    }
    
    function setStatus(type, msg) {
      statusEl.className = "status" + (type ? " " + type : "");
      statusEl.textContent = msg;
    }
    
    function setResult(msg) {
      resultEl.textContent = msg;
    }
    
    function switchPage(page) {
      activePage = page;
      document.querySelectorAll(".nav-btn").forEach(b => {
        b.classList.toggle("active", b.dataset.page === page);
      });
      document.querySelectorAll(".page").forEach(p => {
        p.classList.toggle("active", p.id === "page-" + page);
      });
      updateTranslations();
    }
    
    function invoke(cmd, payload) {
      const t = window.__TAURI__;
      if (!t || !t.core || typeof t.core.invoke !== "function") {
        throw new Error("Tauri runtime not available.");
      }
      return t.core.invoke(cmd, payload);
    }
    
    function getDialogApi() {
      const t = window.__TAURI__;
      return t && t.dialog ? t.dialog : null;
    }
    
    function getWebviewApi() {
      const t = window.__TAURI__;
      return t && t.webview ? t.webview : null;
    }
    
    function getEventApi() {
      const t = window.__TAURI__;
      return t && t.event ? t.event : null;
    }
    
    async function openDialog(options) {
      const dialog = getDialogApi();
      if (!dialog || typeof dialog.open !== "function") {
        throw new Error("Tauri dialog API not available.");
      }
      return dialog.open(options);
    }
    
    async function saveDialog(options) {
      const dialog = getDialogApi();
      if (!dialog || typeof dialog.save !== "function") {
        throw new Error("Tauri dialog API not available.");
      }
      return dialog.save(options);
    }
    
    function scorePassword(p) {
      let s = 0;
      if (!p) return 0;
      if (p.length >= 8) s += 25;
      if (p.length >= 12) s += 15;
      if (/[a-z]/.test(p)) s += 15;
      if (/[A-Z]/.test(p)) s += 15;
      if (/\d/.test(p)) s += 15;
      if (/[^A-Za-z0-9]/.test(p)) s += 15;
      return Math.min(s, 100);
    }
    
    function updateStrength() {
      const p = document.getElementById("enc-password").value;
      const score = scorePassword(p);
      const fill = document.getElementById("enc-fill");
      const text = document.getElementById("enc-strength");
      
      fill.style.width = score + "%";
      
      let color;
      if (score < 35) color = "#f85149";
      else if (score < 60) color = "#d29922";
      else if (score < 80) color = "#3fb950";
      else color = "#2ea043";
      fill.style.background = color;
      
      let label = t("common", "enterPassword");
      if (score > 0 && score < 35) label = t("common", "weak");
      else if (score < 60) label = t("common", "fair");
      else if (score < 80) label = t("common", "strong");
      else if (score >= 80) label = t("common", "veryStrong");
      
      text.textContent = label;
    }
    
    function suggestEnc() {
      const input = document.getElementById("enc-input").value.trim();
      if (!input) return "";
      const norm = input.replace(/[\\/]+$/, "");
      const parts = norm.split(/[/\\]/);
      const name = parts[parts.length - 1] || "encrypted";
      const isFile = /\.[^./\\]+$/.test(name);
      const outName = isFile ? name.replace(/\.[^./\\]+$/, "") + ".timenc" : name + ".timenc";
      const prefix = norm.slice(0, norm.length - name.length);
      return prefix + outName;
    }
    
    function suggestDec() {
      const input = document.getElementById("dec-input").value.trim();
      if (!input) return "";
      const norm = input.replace(/[\\/]+$/, "");
      const idx = Math.max(norm.lastIndexOf("\\"), norm.lastIndexOf("/"));
      return idx >= 0 ? norm.slice(0, idx) : ".";
    }
    
    function updateTranslations() {
      languageSelect.value = currentLang;
      
      document.getElementById("nav-encrypt").textContent = t("nav", "encrypt");
      document.getElementById("nav-decrypt").textContent = t("nav", "decrypt");
      document.getElementById("nav-tools").textContent = t("nav", "tools");
      document.getElementById("nav-settings").textContent = t("nav", "settings");
      
      document.getElementById("enc-title").textContent = t("encrypt", "title");
      document.getElementById("enc-input-label").textContent = t("encrypt", "inputLabel");
      document.getElementById("enc-input").placeholder = t("encrypt", "inputPlaceholder");
      document.getElementById("enc-browse-input").textContent = t("encrypt", "fileBtn");
      document.getElementById("enc-browse-folder").textContent = t("encrypt", "folderBtn");
      document.getElementById("enc-output-label").textContent = t("encrypt", "outputLabel");
      document.getElementById("enc-save-output").textContent = t("encrypt", "saveAsBtn");
      document.getElementById("enc-password-label").textContent = t("encrypt", "passwordLabel");
      document.getElementById("enc-keyfile-label").textContent = t("encrypt", "keyfileLabel");
      document.getElementById("enc-keyfile").placeholder = t("encrypt", "keyfilePlaceholder");
      document.getElementById("enc-browse-keyfile").textContent = t("encrypt", "browseBtn");
      document.getElementById("jump-tools").textContent = t("encrypt", "createBtn");
      document.getElementById("enc-submit").textContent = t("encrypt", "submitBtn");
      
      document.getElementById("dec-title").textContent = t("decrypt", "title");
      document.getElementById("dec-input-label").textContent = t("decrypt", "inputLabel");
      document.getElementById("dec-input").placeholder = t("decrypt", "inputPlaceholder");
      document.getElementById("dec-browse-input").textContent = t("decrypt", "browseBtn");
      document.getElementById("dec-output-label").textContent = t("decrypt", "outputLabel");
      document.getElementById("dec-browse-output").textContent = t("encrypt", "folderBtn");
      document.getElementById("dec-password-label").textContent = t("decrypt", "passwordLabel");
      document.getElementById("dec-keyfile-label").textContent = t("decrypt", "keyfileLabel");
      document.getElementById("dec-keyfile").placeholder = t("decrypt", "keyfilePlaceholder");
      document.getElementById("dec-browse-keyfile").textContent = t("decrypt", "browseBtn");
      document.getElementById("dec-submit").textContent = t("decrypt", "submitBtn");
      
      document.getElementById("tools-title").textContent = t("tools", "title");
      document.getElementById("keyfile-label").textContent = t("tools", "label");
      document.getElementById("keyfile-output").placeholder = t("tools", "placeholder");
      document.getElementById("keyfile-save-output").textContent = t("tools", "saveAsBtn");
      document.getElementById("keyfile-submit").textContent = t("tools", "submitBtn");
      document.getElementById("result-label").textContent = t("tools", "resultLabel");
      
      document.getElementById("settings-title").textContent = t("settings", "title");
      document.getElementById("lang-label").textContent = t("settings", "langLabel");
      document.getElementById("version-label").textContent = t("settings", "versionLabel");
      document.getElementById("version-desc").textContent = t("settings", "versionDesc");
      
      if (resultEl.textContent === "No operation run yet." || resultEl.textContent === "Noch kein Vorgang.") {
        setResult(t("common", "noResult"));
      }
      if (statusEl.textContent === "Ready" || statusEl.textContent === "Bereit") {
        setStatus("", t("common", "ready"));
      }
      
      document.querySelectorAll("[data-toggle]").forEach(btn => {
        const input = document.getElementById(btn.dataset.toggle);
        const isHidden = input.type === "password";
        btn.textContent = isHidden ? t("encrypt", "showBtn") : t("encrypt", "hideBtn");
      });
      
      updateStrength();
    }
    
    function setLanguage(lang) {
      currentLang = lang;
      localStorage.setItem("timenc.language", lang);
      updateTranslations();
    }
    
    function handleOpenedTimenc(path) {
      if (!path) return;
      document.getElementById("dec-input").value = path;
      const out = document.getElementById("dec-output");
      if (!out.dataset.userEdited) out.value = suggestDec();
      switchPage("decrypt");
      setResult(path);
    }
    
    function applyDroppedPath(path) {
      const value = Array.isArray(path) ? path[0] : path;
      if (!value || typeof value !== "string") return;
      const looksEncrypted = /\.timenc$/i.test(value);
      
      if (activePage === "decrypt" || looksEncrypted) {
        document.getElementById("dec-input").value = value;
        const out = document.getElementById("dec-output");
        if (!out.dataset.userEdited) out.value = suggestDec();
        if (activePage !== "decrypt") switchPage("decrypt");
        return;
      }
      
      document.getElementById("enc-input").value = value;
      const out = document.getElementById("enc-output");
      if (!out.dataset.userEdited) out.value = suggestEnc();
      if (activePage !== "encrypt") switchPage("encrypt");
    }
    
    async function runForm(button, action) {
      const txt = button.textContent;
      button.disabled = true;
      setStatus("", t("common", "working"));
      
      try {
        const r = await action();
        const msg = r && r.message ? r.message : t("common", "completed");
        const path = r && r.path ? "\nPath: " + r.path : "";
        
        if (r && r.success === false) {
          setStatus("error", msg);
          setResult(msg + path);
        } else {
          setStatus("success", msg);
          setResult(msg + path);
        }
      } catch (e) {
        const msg = e instanceof Error ? e.message : String(e);
        setStatus("error", msg);
        setResult(msg);
      } finally {
        button.disabled = false;
        button.textContent = txt;
      }
    }
    
    document.querySelectorAll(".nav-btn").forEach(b => {
      b.addEventListener("click", () => switchPage(b.dataset.page));
    });
    
    document.querySelectorAll("[data-toggle]").forEach(b => {
      b.addEventListener("click", () => {
        const input = document.getElementById(b.dataset.toggle);
        const show = input.type === "password";
        input.type = show ? "text" : "password";
        b.dataset.visible = show ? "1" : "0";
        b.textContent = show ? t("encrypt", "hideBtn") : t("encrypt", "showBtn");
      });
    });
    
    document.getElementById("enc-input").addEventListener("input", () => {
      const s = suggestEnc();
      const out = document.getElementById("enc-output");
      if (!out.dataset.userEdited) out.value = s;
    });
    
    document.getElementById("enc-output").addEventListener("input", () => {
      document.getElementById("enc-output").dataset.userEdited = "1";
    });
    
    document.getElementById("dec-input").addEventListener("input", () => {
      const s = suggestDec();
      const out = document.getElementById("dec-output");
      if (!out.dataset.userEdited) out.value = s;
    });
    
    document.getElementById("dec-output").addEventListener("input", () => {
      document.getElementById("dec-output").dataset.userEdited = "1";
    });
    
    document.getElementById("enc-password").addEventListener("input", updateStrength);
    
    document.getElementById("enc-browse-input").addEventListener("click", async () => {
      try {
        const selected = await openDialog({ multiple: false, directory: false });
        if (selected) {
          document.getElementById("enc-input").value = selected;
          const out = document.getElementById("enc-output");
          if (!out.dataset.userEdited) out.value = suggestEnc();
        }
      } catch (e) {
        setStatus("error", e instanceof Error ? e.message : String(e));
      }
    });
    
    document.getElementById("enc-browse-folder").addEventListener("click", async () => {
      try {
        const selected = await openDialog({ multiple: false, directory: true });
        if (selected) {
          document.getElementById("enc-input").value = selected;
          const out = document.getElementById("enc-output");
          if (!out.dataset.userEdited) out.value = suggestEnc();
        }
      } catch (e) {
        setStatus("error", e instanceof Error ? e.message : String(e));
      }
    });
    
    document.getElementById("enc-save-output").addEventListener("click", async () => {
      try {
        const suggested = document.getElementById("enc-output").value || suggestEnc() || "encrypted.timenc";
        const selected = await saveDialog({ defaultPath: suggested, filters: [{ name: "TIMENC", extensions: ["timenc"] }] });
        if (selected) {
          const out = document.getElementById("enc-output");
          out.value = selected;
          delete out.dataset.userEdited;
        }
      } catch (e) {
        setStatus("error", e instanceof Error ? e.message : String(e));
      }
    });
    
    document.getElementById("enc-browse-keyfile").addEventListener("click", async () => {
      try {
        const selected = await openDialog({ multiple: false, directory: false });
        if (selected) document.getElementById("enc-keyfile").value = selected;
      } catch (e) {
        setStatus("error", e instanceof Error ? e.message : String(e));
      }
    });
    
    document.getElementById("dec-browse-input").addEventListener("click", async () => {
      try {
        const selected = await openDialog({ multiple: false, directory: false, filters: [{ name: "TIMENC", extensions: ["timenc"] }] });
        if (selected) {
          document.getElementById("dec-input").value = selected;
          const out = document.getElementById("dec-output");
          if (!out.dataset.userEdited) out.value = suggestDec();
        }
      } catch (e) {
        setStatus("error", e instanceof Error ? e.message : String(e));
      }
    });
    
    document.getElementById("dec-browse-output").addEventListener("click", async () => {
      try {
        const selected = await openDialog({ multiple: false, directory: true, defaultPath: document.getElementById("dec-output").value || undefined });
        if (selected) {
          const out = document.getElementById("dec-output");
          out.value = selected;
          delete out.dataset.userEdited;
        }
      } catch (e) {
        setStatus("error", e instanceof Error ? e.message : String(e));
      }
    });
    
    document.getElementById("dec-browse-keyfile").addEventListener("click", async () => {
      try {
        const selected = await openDialog({ multiple: false, directory: false });
        if (selected) document.getElementById("dec-keyfile").value = selected;
      } catch (e) {
        setStatus("error", e instanceof Error ? e.message : String(e));
      }
    });
    
    document.getElementById("jump-tools").addEventListener("click", () => {
      switchPage("tools");
      document.getElementById("keyfile-output").focus();
    });
    
    document.getElementById("keyfile-save-output").addEventListener("click", async () => {
      try {
        const selected = await saveDialog({ defaultPath: document.getElementById("keyfile-output").value || "timenc.key" });
        if (selected) document.getElementById("keyfile-output").value = selected;
      } catch (e) {
        setStatus("error", e instanceof Error ? e.message : String(e));
      }
    });
    
    document.getElementById("encrypt-form").addEventListener("submit", e => {
      e.preventDefault();
      const btn = e.currentTarget.querySelector(".btn-primary");
      const d = new FormData(e.currentTarget);
      runForm(btn, () => invoke("encrypt_file", { request: { input_path: d.get("input"), output_path: d.get("output"), password: d.get("password"), keyfile_path: d.get("keyfile") || null, delete_source: true } }));
    });
    
    document.getElementById("decrypt-form").addEventListener("submit", e => {
      e.preventDefault();
      const btn = e.currentTarget.querySelector(".btn-success");
      const d = new FormData(e.currentTarget);
      runForm(btn, () => invoke("decrypt_file", { request: { input_path: d.get("input"), output_dir: d.get("output"), password: d.get("password"), keyfile_path: d.get("keyfile") || null, delete_source: true } }));
    });
    
    document.getElementById("keyfile-form").addEventListener("submit", e => {
      e.preventDefault();
      const btn = e.currentTarget.querySelector(".btn-primary");
      const d = new FormData(e.currentTarget);
      runForm(btn, async () => {
        const r = await invoke("create_keyfile", { output_path: d.get("output") });
        if (r && r.success !== false && d.get("output")) {
          document.getElementById("enc-keyfile").value = d.get("output");
          document.getElementById("dec-keyfile").value = d.get("output");
        }
        return r;
      });
    });
    
    languageSelect.addEventListener("change", () => setLanguage(languageSelect.value));
    
    const webviewApi = getWebviewApi();
    if (webviewApi && typeof webviewApi.getCurrentWebview === "function") {
      webviewApi.getCurrentWebview().onDragDropEvent((event) => {
        if (event.payload && event.payload.type === "drop" && event.payload.paths && event.payload.paths.length) {
          applyDroppedPath(event.payload.paths[0]);
        }
      });
    }
    
    const eventApi = getEventApi();
    if (eventApi && typeof eventApi.listen === "function") {
      eventApi.listen("timenc://open-file", event => {
        if (event.payload && event.payload.path) handleOpenedTimenc(event.payload.path);
      });
    }
    
    document.addEventListener("dragover", e => e.preventDefault());
    document.addEventListener("drop", e => {
      e.preventDefault();
      const files = e.dataTransfer && e.dataTransfer.files;
      if (files && files.length) {
        const candidate = files[0].path || files[0].name;
        if (candidate) applyDroppedPath(candidate);
      }
    });
    
    updateTranslations();
    invoke("get_launch_context", {}).then(ctx => {
      if (ctx && ctx.pending_open_file) handleOpenedTimenc(ctx.pending_open_file);
    }).catch(() => {});
    
    suggestEnc();
    suggestDec();
  </script>
</body>
</html>
