name: Build and Release Packages

on:
  release:
    types: [published]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build-linux:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-action@stable

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.0-dev \
            libappindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            pkg-config \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            libjavascriptcoregtk-4.0-dev \
            libsoup2.4-dev \
            libxdo-dev \
            libxcb-cursor0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-shape0 \
            libxcb-xinerama0 \
            libxcb-xfixes0 \
            libxkbcommon-x11-0 \
            libxcb1 \
            libgl1 \
            libegl1 \
            libdbus-1-3 \
            squashfs-tools \
            ruby \
            ruby-dev

      - name: Install Tauri CLI
        run: cargo install tauri-cli

      - name: Install AppImage tools
        run: |
          wget -O appimagetool https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool
          sudo mv appimagetool /usr/local/bin/

      - name: Build CLI
        run: cargo build --release

      - name: Build Tauri App
        run: cargo tauri build

      - name: Create AppImage
        run: |
          mkdir -p TimENC.AppDir/usr/bin
          mkdir -p TimENC.AppDir/usr/share/applications
          mkdir -p TimENC.AppDir/usr/share/icons/hicolor/256x256/apps
          cp target/release/timenc TimENC.AppDir/usr/bin/
          cp legacy/TimENC.desktop TimENC.AppDir/usr/share/applications/
          cp src-tauri/icons/128x128.png TimENC.AppDir/usr/share/icons/hicolor/256x256/apps/timenc.png

          cat > TimENC.AppDir/AppRun << 'EOF'
          #!/bin/bash
          HERE="$(dirname "$(readlink -f "${0}")")"
          exec "${HERE}/usr/bin/timenc" "$@"
          EOF
          chmod +x TimENC.AppDir/AppRun

          cp legacy/TimENC.desktop TimENC.AppDir/
          cp src-tauri/icons/128x128.png TimENC.AppDir/timenc.png

          appimagetool --appimage-extract-and-run TimENC.AppDir TimENC-${{ github.event.release.tag_name }}-x86_64.AppImage

      - name: Create .deb package
        run: |
          cargo install cargo-deb
          cargo deb --output timenc_${{ github.event.release.tag_name }}_amd64.deb

      - name: Upload Linux Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            TimENC-${{ github.event.release.tag_name }}-x86_64.AppImage
            timenc_${{ github.event.release.tag_name }}_amd64.deb
            target/release/timenc

  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-action@stable

      - name: Install WebView2
        run: |
          Invoke-WebRequest -Uri "https://go.microsoft.com/fwlink/p/?LinkId=2124703" -OutFile "webview2.exe"
          Start-Process -FilePath "webview2.exe" -ArgumentList "/silent", "/install" -Wait

      - name: Install Tauri CLI
        run: cargo install tauri-cli

      - name: Build CLI
        run: cargo build --release

      - name: Build Tauri App
        run: cargo tauri build

      - name: Create Portable EXE
        run: |
          Copy-Item target\release\timenc.exe TimENC-portable-${{ github.event.release.tag_name }}.exe

      - name: Build NSIS Installer
        shell: pwsh
        run: |
          $ver = "${{ github.event.release.tag_name }}"
          $nsisScript = @"
          !define APPNAME "TimENC"
          !define VERSION "$ver"
          Name "TimENC"
          OutFile "TimENC-Setup-$ver.exe"
          InstallDir "`$PROGRAMFILES\TimENC"
          Page directory
          Page instfiles
          Section
            SetOutPath "`$INSTDIR"
            File /r "src-tauri\target\release\*"
            WriteUninstaller "`$INSTDIR\uninstall.exe"
            CreateShortcut "`$DESKTOP\TimENC.lnk" "`$INSTDIR\timenc.exe"
          SectionEnd
          Section "Uninstall"
            Delete "`$DESKTOP\TimENC.lnk"
            Delete "`$INSTDIR\uninstall.exe"
            RMDir /r "`$INSTDIR"
          SectionEnd
          "@
          $nsisScript | Out-File -Encoding ASCII installer.nsi
          
          # Download and install NSIS
          Invoke-WebRequest -Uri "https://sourceforge.net/projects/nsis/files/NSIS%203/3.08/nsis-3.08-setup.exe/download" -OutFile "nsis-setup.exe"
          Start-Process -FilePath "nsis-setup.exe" -ArgumentList "/S" -Wait
          Start-Sleep -Seconds 10
          
          & "C:\Program Files (x86)\NSIS\makensis.exe" installer.nsi

      - name: Upload Windows Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            TimENC-portable-${{ github.event.release.tag_name }}.exe
            TimENC-Setup-${{ github.event.release.tag_name }}.exe

  build-macos:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-action@stable

      - name: Install Tauri CLI
        run: cargo install tauri-cli

      - name: Build CLI
        run: cargo build --release

      - name: Build Tauri App
        run: cargo tauri build

      - name: Create DMG
        run: |
          mkdir dmg-staging
          cp -r src-tauri/target/release/TimENC.app dmg-staging/
          hdiutil create -volname "TimENC" -srcfolder dmg-staging -ov -format UDZO TimENC-${{ github.event.release.tag_name }}.dmg

      - name: Upload macOS Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            TimENC-${{ github.event.release.tag_name }}.dmg
