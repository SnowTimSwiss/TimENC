name: Build and Release Packages

on:
  release:
    types: [published]

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: 1
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-linux:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo Registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Cache Tauri Target
        uses: actions/cache@v5
        with:
          path: |
            target
          key: ${{ runner.os }}-tauri-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-tauri-

      - name: Install Tauri dependencies (Ubuntu 24.04)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libgtk-3-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev \
            libxdo-dev \
            libxcb-cursor0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-shape0 \
            libxcb-xinerama0 \
            libxcb-xfixes0 \
            libxkbcommon-x11-0 \
            libxcb1 \
            libgl1 \
            libegl1 \
            libdbus-1-3 \
            libx11-dev \
            libx11-6 \
            libayatana-ido3-dev \
            libayatana-indicator3-dev

      - name: Install Tauri CLI
        run: cargo install tauri-cli --locked

      - name: Create minimal frontend
        run: |
          mkdir -p src-tauri/dist
          cat > src-tauri/dist/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>TimENC</title>
              <style>
                  body {
                      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
                      display: flex;
                      justify-content: center;
                      align-items: center;
                      height: 100vh;
                      margin: 0;
                      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
                      color: #eee;
                  }
                  .container { text-align: center; padding: 40px; }
                  h1 { color: #00d9ff; margin-bottom: 10px; }
                  p { color: #aaa; }
              </style>
          </head>
          <body>
              <div class="container">
                  <h1>TimENC</h1>
                  <p>Secure Encryption Tool</p>
                  <p>Use the CLI for encryption operations.</p>
              </div>
          </body>
          </html>
          EOF

      - name: Build Tauri Bundles
        run: cargo tauri build --bundles appimage,deb

      - name: List Linux Bundles
        run: find target/release/bundle -maxdepth 2 -type f

      - name: Upload Linux Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/release/bundle/appimage/*.AppImage
            target/release/bundle/deb/*.deb

  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo Registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Cache Tauri Target
        uses: actions/cache@v5
        with:
          path: |
            target
          key: ${{ runner.os }}-tauri-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-tauri-

      - name: Install Tauri CLI
        run: cargo install tauri-cli --locked

      - name: Create minimal frontend
        run: |
          New-Item -ItemType Directory -Force -Path src-tauri\dist
          @"
          <!DOCTYPE html>
          <html lang="en">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>TimENC</title>
              <style>
                  body {
                      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
                      display: flex;
                      justify-content: center;
                      align-items: center;
                      height: 100vh;
                      margin: 0;
                      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
                      color: #eee;
                  }
                  .container { text-align: center; padding: 40px; }
                  h1 { color: #00d9ff; margin-bottom: 10px; }
                  p { color: #aaa; }
              </style>
          </head>
          <body>
              <div class="container">
                  <h1>TimENC</h1>
                  <p>Secure Encryption Tool</p>
                  <p>Use the CLI for encryption operations.</p>
              </div>
          </body>
          </html>
          "@ | Out-File -Encoding UTF8 src-tauri\dist\index.html

      - name: Build Tauri Bundles
        run: cargo tauri build --bundles nsis

      - name: Create Portable EXE
        run: |
          $guiExe = Get-ChildItem target\release\*.exe |
            Where-Object { $_.Name -ne "timenc.exe" } |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1
          if (-not $guiExe) {
            throw "Could not find the Tauri GUI executable in target\\release"
          }
          Copy-Item $guiExe.FullName "TimENC-portable-${{ github.event.release.tag_name }}.exe"

      - name: List Windows Bundles
        run: |
          Get-ChildItem target\release\bundle -Recurse -File | Select-Object FullName,Length | Format-Table -AutoSize

      - name: Upload Windows Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            TimENC-portable-${{ github.event.release.tag_name }}.exe
            target/release/bundle/nsis/*.exe

  build-macos:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo Registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Cache Tauri Target
        uses: actions/cache@v5
        with:
          path: |
            target
          key: ${{ runner.os }}-tauri-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-tauri-

      - name: Install Tauri CLI
        run: cargo install tauri-cli --locked

      - name: Create minimal frontend
        run: |
          mkdir -p src-tauri/dist
          cat > src-tauri/dist/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>TimENC</title>
              <style>
                  body {
                      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
                      display: flex;
                      justify-content: center;
                      align-items: center;
                      height: 100vh;
                      margin: 0;
                      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
                      color: #eee;
                  }
                  .container { text-align: center; padding: 40px; }
                  h1 { color: #00d9ff; margin-bottom: 10px; }
                  p { color: #aaa; }
              </style>
          </head>
          <body>
              <div class="container">
                  <h1>TimENC</h1>
                  <p>Secure Encryption Tool</p>
                  <p>Use the CLI for encryption operations.</p>
              </div>
          </body>
          </html>
          EOF

      - name: Build Tauri Bundles
        run: cargo tauri build --bundles dmg

      - name: List macOS Bundles
        run: find target/release/bundle -maxdepth 2 -type f

      - name: Upload macOS Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/release/bundle/dmg/*.dmg
