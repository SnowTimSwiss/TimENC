name: Build and Release Packages

on:
  release:
    types: [published]

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: 1
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-linux:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo Registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Cache Tauri Target
        uses: actions/cache@v5
        with:
          path: |
            target
          key: ${{ runner.os }}-tauri-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-tauri-

      - name: Install Tauri dependencies (Ubuntu 24.04)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libgtk-3-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev \
            libxdo-dev \
            libxcb-cursor0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-shape0 \
            libxcb-xinerama0 \
            libxcb-xfixes0 \
            libxkbcommon-x11-0 \
            libxcb1 \
            libgl1 \
            libegl1 \
            libdbus-1-3 \
            libx11-dev \
            libx11-6 \
            libayatana-ido3-dev \
            libayatana-indicator3-dev

      - name: Install Tauri CLI
        run: cargo install tauri-cli --locked

      - name: Build CLI
        run: cargo build --release

      - name: Create minimal frontend
        run: |
          mkdir -p src-tauri/dist
          cat > src-tauri/dist/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>TimENC</title>
              <style>
                  body {
                      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
                      display: flex;
                      justify-content: center;
                      align-items: center;
                      height: 100vh;
                      margin: 0;
                      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
                      color: #eee;
                  }
                  .container { text-align: center; padding: 40px; }
                  h1 { color: #00d9ff; margin-bottom: 10px; }
                  p { color: #aaa; }
              </style>
          </head>
          <body>
              <div class="container">
                  <h1>TimENC</h1>
                  <p>Secure Encryption Tool</p>
                  <p>Use the CLI for encryption operations.</p>
              </div>
          </body>
          </html>
          EOF

      - name: Build Tauri App
        run: cargo tauri build

      - name: Create AppImage
        run: |
          mkdir -p TimENC.AppDir/usr/bin
          mkdir -p TimENC.AppDir/usr/share/applications
          mkdir -p TimENC.AppDir/usr/share/icons/hicolor/256x256/apps
          cp target/release/timenc TimENC.AppDir/usr/bin/
          cp TimENC.desktop TimENC.AppDir/usr/share/applications/
          cp src-tauri/icons/128x128.png TimENC.AppDir/usr/share/icons/hicolor/256x256/apps/timenc.png

          cat > TimENC.AppDir/AppRun << 'EOF'
          #!/bin/bash
          HERE="$(dirname "$(readlink -f "${0}")")"
          exec "${HERE}/usr/bin/timenc" "$@"
          EOF
          chmod +x TimENC.AppDir/AppRun

          cp TimENC.desktop TimENC.AppDir/
          cp src-tauri/icons/128x128.png TimENC.AppDir/timenc.png

          wget -O appimagetool https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool
          ARCH=x86_64 ./appimagetool --appimage-extract-and-run TimENC.AppDir TimENC-${{ github.event.release.tag_name }}-x86_64.AppImage

      - name: Create .deb package
        run: |
          cargo install cargo-deb --locked
          cargo deb --output timenc_${{ github.event.release.tag_name }}_amd64.deb

      - name: Prepare Linux CLI Asset
        run: |
          cp target/release/timenc timenc-${{ github.event.release.tag_name }}-linux-x86_64

      - name: Upload Linux Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            TimENC-${{ github.event.release.tag_name }}-x86_64.AppImage
            timenc_${{ github.event.release.tag_name }}_amd64.deb
            timenc-${{ github.event.release.tag_name }}-linux-x86_64

  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo Registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Cache Tauri Target
        uses: actions/cache@v5
        with:
          path: |
            target
          key: ${{ runner.os }}-tauri-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-tauri-

      - name: Install Tauri CLI
        run: cargo install tauri-cli --locked

      - name: Build CLI
        run: cargo build --release

      - name: Create minimal frontend
        run: |
          New-Item -ItemType Directory -Force -Path src-tauri\dist
          @"
          <!DOCTYPE html>
          <html lang="en">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>TimENC</title>
              <style>
                  body {
                      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
                      display: flex;
                      justify-content: center;
                      align-items: center;
                      height: 100vh;
                      margin: 0;
                      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
                      color: #eee;
                  }
                  .container { text-align: center; padding: 40px; }
                  h1 { color: #00d9ff; margin-bottom: 10px; }
                  p { color: #aaa; }
              </style>
          </head>
          <body>
              <div class="container">
                  <h1>TimENC</h1>
                  <p>Secure Encryption Tool</p>
                  <p>Use the CLI for encryption operations.</p>
              </div>
          </body>
          </html>
          "@ | Out-File -Encoding UTF8 src-tauri\dist\index.html

      - name: Build Tauri App
        run: cargo tauri build

      - name: Create Portable EXE
        run: |
          Copy-Item target\release\timenc.exe TimENC-portable-${{ github.event.release.tag_name }}.exe

      - name: Build NSIS Installer
        shell: pwsh
        run: |
          $ver = "${{ github.event.release.tag_name }}"
          $nsisScript = @"
          !define APPNAME "TimENC"
          !define VERSION "$ver"
          Name "TimENC"
          OutFile "TimENC-Setup-$ver.exe"
          InstallDir "`$PROGRAMFILES\TimENC"
          Page directory
          Page instfiles
          Section
            SetOutPath "`$INSTDIR"
            File /r "target\release\*"
            WriteUninstaller "`$INSTDIR\uninstall.exe"
            CreateShortcut "`$DESKTOP\TimENC.lnk" "`$INSTDIR\timenc.exe"
          SectionEnd
          Section "Uninstall"
            Delete "`$DESKTOP\TimENC.lnk"
            Delete "`$INSTDIR\uninstall.exe"
            RMDir /r "`$INSTDIR"
          SectionEnd
          "@
          $nsisScript | Out-File -Encoding ASCII installer.nsi

          choco install nsis -y --no-progress

          & "C:\Program Files (x86)\NSIS\makensis.exe" installer.nsi

      - name: Upload Windows Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            TimENC-portable-${{ github.event.release.tag_name }}.exe
            TimENC-Setup-${{ github.event.release.tag_name }}.exe

  build-macos:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo Registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Cache Tauri Target
        uses: actions/cache@v5
        with:
          path: |
            target
          key: ${{ runner.os }}-tauri-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-tauri-

      - name: Install Tauri CLI
        run: cargo install tauri-cli --locked

      - name: Build CLI
        run: cargo build --release

      - name: Create minimal frontend
        run: |
          mkdir -p src-tauri/dist
          cat > src-tauri/dist/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>TimENC</title>
              <style>
                  body {
                      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
                      display: flex;
                      justify-content: center;
                      align-items: center;
                      height: 100vh;
                      margin: 0;
                      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
                      color: #eee;
                  }
                  .container { text-align: center; padding: 40px; }
                  h1 { color: #00d9ff; margin-bottom: 10px; }
                  p { color: #aaa; }
              </style>
          </head>
          <body>
              <div class="container">
                  <h1>TimENC</h1>
                  <p>Secure Encryption Tool</p>
                  <p>Use the CLI for encryption operations.</p>
              </div>
          </body>
          </html>
          EOF

      - name: Build Tauri App
        run: cargo tauri build

      - name: Create DMG
        run: |
          mkdir dmg-staging
          test -d target/release/bundle/macos/TimENC.app
          cp -r target/release/bundle/macos/TimENC.app dmg-staging/
          hdiutil create -volname "TimENC" -srcfolder dmg-staging -ov -format UDZO TimENC-${{ github.event.release.tag_name }}.dmg

      - name: Upload macOS Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            TimENC-${{ github.event.release.tag_name }}.dmg
