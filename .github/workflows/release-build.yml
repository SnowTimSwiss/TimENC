name: Build and Release Packages

on:
  release:
    types: [published]

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: 1
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-linux:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo Registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Cache Tauri Target
        uses: actions/cache@v5
        with:
          path: |
            src-tauri/target
          key: ${{ runner.os }}-tauri-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-tauri-

      - name: Install Tauri dependencies (Ubuntu 24.04)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libgtk-3-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev \
            libxdo-dev \
            libxcb-cursor0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-shape0 \
            libxcb-xinerama0 \
            libxcb-xfixes0 \
            libxkbcommon-x11-0 \
            libxcb1 \
            libgl1 \
            libegl1 \
            libdbus-1-3 \
            libx11-dev \
            libx11-6 \
            libayatana-ido3-dev \
            libayatana-indicator3-dev

      - name: Install Tauri CLI
        run: cargo install tauri-cli --locked

      - name: Build Tauri Bundles
        run: |
          cd src-tauri
          cargo tauri build --bundles appimage,deb

      - name: List Linux Bundles
        run: find src-tauri/target/release/bundle -maxdepth 2 -type f

      - name: Upload Linux Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/deb/*.deb

      - name: Upload deb artifact (for Flatpak job)
        uses: actions/upload-artifact@v4
        with:
          name: timenc-deb
          path: src-tauri/target/release/bundle/deb/*.deb

  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo Registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Cache Tauri Target
        uses: actions/cache@v5
        with:
          path: |
            src-tauri/target
          key: ${{ runner.os }}-tauri-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-tauri-

      - name: Install Tauri CLI
        run: cargo install tauri-cli --locked

      - name: Build Tauri Bundles
        run: |
          cd src-tauri
          cargo tauri build --bundles nsis

      - name: Create Portable EXE
        run: |
          $guiExe = Get-ChildItem src-tauri\target\release\*.exe |
            Where-Object { $_.Name -ne "timenc.exe" } |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1
          if (-not $guiExe) {
            throw "Could not find the Tauri GUI executable in src-tauri\\target\\release"
          }
          Copy-Item $guiExe.FullName "TimENC-portable-${{ github.event.release.tag_name }}.exe"

      - name: List Windows Bundles
        run: |
          Get-ChildItem src-tauri\target\release\bundle -Recurse -File | Select-Object FullName,Length | Format-Table -AutoSize

      - name: Upload Windows Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            TimENC-portable-${{ github.event.release.tag_name }}.exe
            src-tauri/target/release/bundle/nsis/*.exe

  build-macos:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo Registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Cache Tauri Target
        uses: actions/cache@v5
        with:
          path: |
            src-tauri/target
          key: ${{ runner.os }}-tauri-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-tauri-

      - name: Install Tauri CLI
        run: cargo install tauri-cli --locked

      - name: Build Tauri Bundles
        run: |
          cd src-tauri
          cargo tauri build --bundles dmg

      - name: List macOS Bundles
        run: find src-tauri/target/release/bundle -maxdepth 2 -type f

      - name: Upload macOS Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/release/bundle/dmg/*.dmg

  build-flatpak:
    runs-on: ubuntu-24.04
    needs: build-linux
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download deb artifact
        uses: actions/download-artifact@v4
        with:
          name: timenc-deb
          path: flatpak-build

      - name: Install Flatpak tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder
          flatpak remote-add --user --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          flatpak install --user -y flathub org.gnome.Platform//48 org.gnome.Sdk//48

      - name: Stage build inputs
        run: |
          cp flatpak/io.github.SnowTimSwiss.TimENC.yml flatpak-build/
          cp flatpak/io.github.SnowTimSwiss.TimENC.desktop flatpak-build/
          cp flatpak/io.github.SnowTimSwiss.TimENC.metainfo.xml flatpak-build/
          cp flatpak/timenc-wrapper.sh flatpak-build/
          mv flatpak-build/*.deb flatpak-build/timenc.deb

      - name: Build Flatpak bundle
        run: |
          cd flatpak-build
          flatpak-builder --user --disable-rofiles-fuse --force-clean \
            --repo=repo build-dir io.github.SnowTimSwiss.TimENC.yml
          flatpak build-bundle repo \
            "TimENC-${{ github.event.release.tag_name }}.flatpak" \
            io.github.SnowTimSwiss.TimENC

      - name: Upload Flatpak Asset
        uses: softprops/action-gh-release@v2
        with:
          files: flatpak-build/TimENC-${{ github.event.release.tag_name }}.flatpak
