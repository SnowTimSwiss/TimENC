name: Build and Release Packages

on:
  release:
    types: [published]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
          sudo apt-get update
          sudo apt-get install -y squashfs-tools ruby ruby-dev
          # Qt/X11 dependencies for PySide6
          sudo apt-get install -y libxcb-cursor0 libxcb-icccm4 libxcb-image0 \
            libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 libxcb-shape0 \
            libxcb-xinerama0 libxcb-xfixes0 libxkbcommon-x11-0 libxcb1 \
            libgl1 libegl1 libdbus-1-3
          sudo gem install --no-document fpm

      - name: Build executable with PyInstaller
        run: pyinstaller TimENC.spec

      - name: Create AppImage
        run: |
          mkdir -p TimENC.AppDir/usr/bin
          mkdir -p TimENC.AppDir/usr/share/applications
          mkdir -p TimENC.AppDir/usr/share/icons/hicolor/256x256/apps
          cp dist/TimENC TimENC.AppDir/usr/bin/
          cp TimENC.desktop TimENC.AppDir/usr/share/applications/
          cp Images/TimENC-Icon.png TimENC.AppDir/usr/share/icons/hicolor/256x256/apps/timenc.png
          
          # Simplified AppRun for PyInstaller one-file
          cat > TimENC.AppDir/AppRun << 'EOF'
          #!/bin/bash
          HERE="$(dirname "$(readlink -f "${0}")")"
          exec "${HERE}/usr/bin/TimENC" "$@"
          EOF
          chmod +x TimENC.AppDir/AppRun
          
          cp TimENC.desktop TimENC.AppDir/
          cp Images/TimENC-Icon.png TimENC.AppDir/timenc.png
          
          wget -O appimagetool https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool
          ARCH=x86_64 ./appimagetool --appimage-extract-and-run TimENC.AppDir TimENC-${{ github.event.release.tag_name }}-x86_64.AppImage

      - name: Create .deb package
        run: |
          fpm -s dir -t deb -n timenc -v ${{ github.event.release.tag_name }} \
            --description "TimENC - Simple encryption tool" \
            --url "https://github.com/SnowTimSwiss/TimENC" \
            --architecture amd64 \
            -p timenc_${{ github.event.release.tag_name }}_amd64.deb \
            dist/TimENC=/usr/bin/timenc

      - name: Upload Linux Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            TimENC-${{ github.event.release.tag_name }}-x86_64.AppImage
            timenc_${{ github.event.release.tag_name }}_amd64.deb

  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
          choco install nsis -y
          echo "C:\Program Files (x86)\NSIS" >> $env:GITHUB_PATH

      - name: Build Portable EXE
        run: |
          pyinstaller TimENC.spec
          move dist\TimENC.exe TimENC-portable-${{ github.event.release.tag_name }}.exe

      - name: Prepare Installer Files
        run: |
          # Create onedir version for the installer to avoid slow startup
          pyinstaller --onedir --noconfirm --windowed --name TimENC --icon Images/TimENC-Icon.ico --add-data "Images/TimENC-Icon.png;Images" timenc.py

      - name: Build NSIS Installer
        shell: pwsh
        run: |
          $ver = "${{ github.event.release.tag_name }}"
          $nsisScript = @"
          !define APPNAME "TimENC"
          !define VERSION "`$ver"
          Name "`$APPNAME"
          OutFile "TimENC-Setup-`$ver.exe"
          InstallDir "`$PROGRAMFILES\TimENC"
          Page directory
          Page instfiles
          Section
            SetOutPath "`$INSTDIR"
            File /r "dist\TimENC\*"
            WriteUninstaller "`$INSTDIR\uninstall.exe"
            # Create Shortcut
            CreateShortcut "`$DESKTOP\TimENC.lnk" "`$INSTDIR\TimENC.exe"
          SectionEnd
          Section "Uninstall"
            Delete "`$DESKTOP\TimENC.lnk"
            Delete "`$INSTDIR\uninstall.exe"
            RMDir /r "`$INSTDIR"
          SectionEnd
          "@
          $nsisScript | Out-File -Encoding UTF8 installer.nsi
          & "C:\Program Files (x86)\NSIS\makensis.exe" installer.nsi

      - name: Upload Windows Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            TimENC-portable-${{ github.event.release.tag_name }}.exe
            TimENC-Setup-${{ github.event.release.tag_name }}.exe

  build-macos:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build macOS Assets
        run: |
          pyinstaller TimENC.spec
          mkdir dmg-staging
          cp -r dist/TimENC.app dmg-staging/
          hdiutil create -volname "TimENC" -srcfolder dmg-staging -ov -format UDZO TimENC-${{ github.event.release.tag_name }}.dmg

      - name: Upload macOS Assets
        uses: softprops/action-gh-release@v2
        with:
          files: TimENC-${{ github.event.release.tag_name }}.dmg
